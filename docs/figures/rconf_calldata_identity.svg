<svg viewBox="0 0 1000 640" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d">
  <title id="t">r_conf 不可強制:誠實與惡意的結算 calldata 字面相同</title>
  <desc id="d">誠實 provider 回報 usage 100、惡意 provider 回報 max/2,但兩者送進 escrow.settle 的 100-byte calldata 完全相同,escrow 無從分辨,兩者皆被接受。</desc>
  <style>
    .ttl{font:700 26px -apple-system,'Segoe UI',Roboto,'Noto Sans TC',sans-serif;fill:#1f2933}
    .sub{font:14px -apple-system,'Segoe UI',Roboto,'Noto Sans TC',sans-serif;fill:#5b6b7b}
    .lbl{font:700 15px -apple-system,'Segoe UI',Roboto,'Noto Sans TC',sans-serif}
    .cap{font:13px -apple-system,'Segoe UI',Roboto,'Noto Sans TC',sans-serif;fill:#3a4a57}
    .small{font:12px -apple-system,'Segoe UI',Roboto,'Noto Sans TC',sans-serif;fill:#5b6b7b}
    .tiny{font:10px ui-monospace,'SF Mono',Menlo,monospace;fill:#8a97a3}
    .mono{font:13px ui-monospace,'SF Mono',Menlo,monospace;fill:#1f2933}
    .monobig{font:700 20px ui-monospace,'SF Mono',Menlo,monospace;fill:#1f2933}
    .seglbl{font:10px -apple-system,'Segoe UI',Roboto,sans-serif;fill:#5b6b7b}
  </style>
  <rect x="1" y="1" width="998" height="638" rx="16" fill="#ffffff" stroke="#d9e0e6"/>
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#9aa6b2"/>
    </marker>
  </defs>

  <text x="500" y="44" text-anchor="middle" class="ttl">r_conf:鏈上分不出誠實與惡意</text>
  <text x="500" y="70" text-anchor="middle" class="sub">Section F — settle calldata 字面相等示範</text>

  <!-- honest provider -->
  <rect x="70" y="98" width="320" height="106" rx="12" fill="#e9f7f0" stroke="#2f9e6f"/>
  <text x="92" y="128" class="lbl" fill="#1f7a55">誠實 provider</text>
  <text x="92" y="154" class="small">reportedUsage(鏈下真實)</text>
  <text x="92" y="186" class="monobig">100</text>

  <!-- malicious provider -->
  <rect x="610" y="98" width="320" height="106" rx="12" fill="#fbe9ec" stroke="#d6455d"/>
  <text x="632" y="128" class="lbl" fill="#b3273f">惡意 provider</text>
  <text x="632" y="154" class="small">reportedUsage(捏造)</text>
  <text x="632" y="186" class="monobig">5.79 × 10⁷⁶</text>

  <!-- converging arrows -->
  <path d="M230 204 C230 250 410 250 470 286" fill="none" stroke="#9aa6b2" stroke-width="2" marker-end="url(#ah)"/>
  <path d="M770 204 C770 250 590 250 530 286" fill="none" stroke="#9aa6b2" stroke-width="2" marker-end="url(#ah)"/>

  <!-- identical badge -->
  <rect x="396" y="228" width="208" height="32" rx="16" fill="#e8f0fe" stroke="#2f6fed"/>
  <text x="500" y="249" text-anchor="middle" class="lbl" fill="#2f6fed">= 100 bytes 完全相同</text>

  <!-- calldata bar -->
  <g>
    <rect x="140" y="292" width="130" height="64" rx="8" fill="#f4f7f9" stroke="#cdd6de"/>
    <rect x="272" y="292" width="196" height="64" rx="8" fill="#f4f7f9" stroke="#cdd6de"/>
    <rect x="470" y="292" width="196" height="64" rx="8" fill="#f4f7f9" stroke="#cdd6de"/>
    <rect x="668" y="292" width="192" height="64" rx="8" fill="#e8f0fe" stroke="#2f6fed"/>
    <text x="205" y="312" text-anchor="middle" class="seglbl">selector</text>
    <text x="370" y="312" text-anchor="middle" class="seglbl">agent</text>
    <text x="568" y="312" text-anchor="middle" class="seglbl">to</text>
    <text x="764" y="312" text-anchor="middle" class="seglbl">amount</text>
    <text x="205" y="338" text-anchor="middle" class="mono">0x92669141</text>
    <text x="370" y="338" text-anchor="middle" class="mono">0x…0b0b</text>
    <text x="568" y="338" text-anchor="middle" class="mono">0x…0c0c</text>
    <text x="764" y="338" text-anchor="middle" class="mono">0.5 ETH</text>
  </g>
  <text x="500" y="378" text-anchor="middle" class="tiny">0x92669141…0000000b0b…0000000c0c…06f05b59d3b20000</text>

  <!-- arrow to escrow -->
  <path d="M500 388 L500 410" fill="none" stroke="#9aa6b2" stroke-width="2" marker-end="url(#ah)"/>

  <!-- escrow -->
  <rect x="288" y="412" width="424" height="96" rx="12" fill="#eef1f4" stroke="#b9c4cd"/>
  <text x="500" y="442" text-anchor="middle" class="lbl" fill="#1f2933">Escrow.settle(agent, to, amount)</text>
  <text x="500" y="464" text-anchor="middle" class="small">沒有 usage / attestation 欄位可分辨</text>
  <rect x="320" y="476" width="160" height="24" rx="12" fill="#e9f7f0" stroke="#2f9e6f"/>
  <text x="400" y="492" text-anchor="middle" class="cap" fill="#1f7a55">✓ 接受誠實</text>
  <rect x="520" y="476" width="160" height="24" rx="12" fill="#fbe9ec" stroke="#d6455d"/>
  <text x="600" y="492" text-anchor="middle" class="cap" fill="#b3273f">✓ 接受惡意</text>

  <!-- caption -->
  <text x="500" y="552" text-anchor="middle" class="cap">鏈下真實天差地別 → 鏈上 calldata 完全相同 → escrow 無從分辨 → r_conf 不可強制</text>
  <text x="500" y="582" text-anchor="middle" class="tiny">test_HonestAndMalicious_AreIndistinguishableToEscrow · keccak256 相同 · 兩者皆 settle 成功</text>
  <text x="500" y="606" text-anchor="middle" class="tiny">escrow 強制的是「金額」(R(P) 上限),不是「金額是否誠實」</text>
</svg>
